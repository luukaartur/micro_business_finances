<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Micro Accounting Dashboard</title>
    
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bahama-yellow: #E19E11; /* Твій улюблений Porsche 911 Classic Yellow */
            --dark-graphite: #1C1C1E;  /* Глибокий темний графіт */
            --bg-light: #F4F4F6;       
            --card-bg: #FFFFFF;
            --border: #E5E5EA;
            --gray-text: #8E8E93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-light);
            color: var(--dark-graphite);
            min-height: 100vh;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* КОНТЕЙНЕР АДАПТИВНОЇ СІТКИ */
        .app-container {
            width: 100%;
            max-width: 440px;
            background-color: var(--card-bg);
            min-height: 100vh;
            padding: 24px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.03);
        }

        @media (min-width: 800px) {
            body { padding: 40px 24px; }
            .app-container {
                max-width: 1040px;
                min-height: auto;
                border-radius: 24px;
                padding: 40px;
                display: grid;
                grid-template-columns: 380px 1fr;
                gap: 60px;
            }
            .sidebar-panel {
                border-right: 1px solid var(--border);
                padding-right: 40px;
                display: flex;
                flex-direction: column;
                height: 100%;
            }
            .content-panel { display: block; min-height: 500px; }
            .screen { display: none !important; }
            #screen-main { display: flex !important; }
            .content-panel .screen.active { display: flex !important; }
            .back-link { display: none !important; }
            .action-grid { margin-top: 40px !important; }
        }

        @media (max-width: 799px) {
            .screen { display: none; }
            .screen.active { display: flex; flex-direction: column; flex-grow: 1; }
            .content-panel { display: contents; }
        }

        /* ОВЕРЛЕЙ ХОДИТЬ ПО ЦЕНТРУ ДО ЛОГІНУ */
        .auth-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .btn-google-login { 
            background: var(--dark-graphite); 
            color: white; 
            border: none; 
            padding: 18px 36px; 
            font-size: 16px; 
            font-weight: 700; 
            border-radius: 16px; 
            cursor: pointer; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            transition: background 0.2s;
        }
        .btn-google-login:hover { background: #3a3a3c; }

        /* ІНТЕРФЕЙС ДАШБОРДУ */
        .app-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .meta-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--gray-text); font-weight: 700; margin-bottom: 6px; }
        .business-selector { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; border: none; background: transparent; color: var(--dark-graphite); cursor: pointer; outline: none; }
        
        .btn-settings { background: var(--bg-light); border: none; width: 44px; height: 44px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .balance-card { padding: 30px 0; }
        .balance-card .balance-label { color: var(--gray-text); font-size: 13px; letter-spacing: 1px; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
        .balance-card .balance-amount { font-size: 52px; font-weight: 900; letter-spacing: -2px; line-height: 1; }

        .action-grid { display: flex; flex-direction: column; gap: 12px; margin-top: auto; }
        
        .btn-main { width: 100%; height: 60px; border-radius: 16px; font-size: 18px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.1s ease; }
        .btn-main:active { transform: scale(0.98); }
        .btn-yellow { background-color: var(--bahama-yellow); color: white; }
        .btn-dark { background-color: var(--dark-graphite); color: white; }
        .btn-outline { background-color: transparent; border: 2px solid var(--dark-graphite); color: var(--dark-graphite); }
        .btn-main.selected { border: 3px solid var(--dark-graphite); box-shadow: 0 0 10px rgba(0,0,0,0.1); }

        /* ТИПОГРАФІКА ФОРМ */
        .back-link { font-size: 16px; font-weight: 600; color: var(--dark-graphite); cursor: pointer; margin-bottom: 24px; display: inline-block; }
        .screen-title { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 30px; }
        
        .huge-amount-container { margin-bottom: 30px; border-bottom: 3px solid var(--dark-graphite); padding-bottom: 4px; }
        .huge-amount-input { width: 100%; border: none; font-size: 48px; font-weight: 900; outline: none; color: var(--dark-graphite); background: transparent; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--gray-text); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .standard-input, .standard-select { width: 100%; height: 54px; border: 2px solid var(--border); border-radius: 14px; padding: 0 16px; font-size: 18px; color: var(--dark-graphite); outline: none; background-color: var(--bg-light); }
        .standard-input:focus, .standard-select:focus { border-color: var(--dark-graphite); }

        .select-combo { display: flex; gap: 10px; }
        .btn-plus-inline { width: 54px; height: 54px; border-radius: 14px; border: 2px solid var(--dark-graphite); background-color: transparent; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* ЗВІТНІСТЬ */
        .date-range-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .report-summary { background-color: var(--bg-light); border-radius: 16px; padding: 20px; margin: 20px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .summary-block { display: flex; flex-direction: column; }
        .summary-block.full-width { grid-column: span 2; border-top: 1px solid var(--border); padding-top: 12px; }
        .summary-num { font-size: 22px; font-weight: 800; margin-top: 4px; }
        .text-income { color: #248A3D; }
        .text-expense { color: #D9383A; }
        .chart-container { position: relative; width: 100%; height: 280px; margin-top: 20px; }

        /* МОДАЛКА ТА ТОСТ */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 100; }
        .modal-overlay.active { display: flex; }
        .modal-card { background: white; border-radius: 20px; padding: 24px; width: 100%; max-width: 360px; }
        .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 16px; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translate(-50%, 100px); background-color: var(--dark-graphite); color: white; padding: 16px 32px; border-radius: 30px; font-weight: 600; opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 200; }
        .toast.show { transform: translate(-50%, 0); opacity: 1; }

        @media (min-width: 800px) {
            .pc-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--gray-text); text-align: center; font-size: 16px; font-weight: 500; }
        }
        @media (max-width: 799px) {
            .pc-placeholder { display: none !important; }
        }
    </style>
</head>
<body>

<div id="auth-overlay" class="auth-overlay">
    <button class="btn-google-login" onclick="loginWithGoogle()">Увійти через Google акаунт</button>
</div>

<div class="app-container" id="app-main-layout" style="display: none;">
    <div id="appToast" class="toast">Завантаження...</div>

    <div id="screen-main" class="screen sidebar-panel">
        <div class="app-header">
            <div>
                <div class="meta-label">МІКРО БУХГАЛТЕРІЯ</div>
                <select id="businessSelect" class="business-selector" onchange="changeBusiness()"></select>
            </div>
            <button class="btn-settings" onclick="goToScreen('screen-settings')">⚙️</button>
        </div>

        <div class="balance-card">
            <div class="balance-label">Загальний Бюджет</div>
            <div class="balance-amount" id="mainBalance">0 ₴</div>
        </div>

        <div class="action-grid">
            <button id="btn-nav-expense" class="btn-main btn-yellow" onclick="goToScreen('screen-expense')">➕ Додати витрату</button>
            <button id="btn-nav-income" class="btn-main btn-outline" onclick="goToScreen('screen-income')">💵 Додати прибуток</button>
            <button id="btn-nav-report" class="btn-main btn-dark" onclick="openReportScreen()">📊 Звітність</button>
        </div>
    </div>

    <div class="content-panel">
        
        <div id="pc-blank" class="pc-placeholder">
            <span>← Оберіть дію ліворуч, щоб почати роботу</span>
        </div>

        <div id="screen-expense" class="screen">
            <span class="back-link" onclick="goToScreen('screen-main')">← Головна</span>
            <h2 class="screen-title">Додати витрату</h2>
            <form id="expenseForm" onsubmit="handleSaveExpense(event)">
                <div class="form-group">
                    <label>Сума витрати (₴)</label>
                    <div class="huge-amount-container">
                        <input type="number" id="expPrice" class="huge-amount-input" placeholder="0" inputmode="decimal" step="any" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Найменування</label>
                    <input type="text" id="expName" class="standard-input" placeholder="Наприклад: Фурнітура" required>
                </div>
                <div class="form-group">
                    <label>Кількість</label>
                    <input type="number" id="expQty" class="standard-input" value="1" inputmode="decimal" step="any" required>
                </div>
                <div class="form-group">
                    <label>Категорія</label>
                    <div class="select-combo">
                        <select id="expCategory" class="standard-select" required></select>
                        <button type="button" class="btn-plus-inline" onclick="openModal('category')">+</button>
                    </div>
                </div>
                <button type="submit" class="btn-main btn-dark" style="margin-top: 20px;">Записати витрату</button>
            </form>
        </div>

        <div id="screen-income" class="screen">
            <span class="back-link" onclick="goToScreen('screen-main')">← Головна</span>
            <h2 class="screen-title">Додати прибуток</h2>
            <form id="incomeForm" onsubmit="handleSaveIncome(event)">
                <div class="form-group">
                    <label>Сума прибутку (₴)</label>
                    <div class="huge-amount-container">
                        <input type="number" id="incAmount" class="huge-amount-input" placeholder="0" inputmode="decimal" step="any" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>За що</label>
                    <input type="text" id="incName" class="standard-input" placeholder="Наприклад: Продаж сумочки" required>
                </div>
                <div class="form-group">
                    <label>Від кого</label>
                    <div class="select-combo">
                        <select id="incClient" class="standard-select" required></select>
                        <button type="button" class="btn-plus-inline" onclick="openModal('client')">+</button>
                    </div>
                </div>
                <button type="submit" class="btn-main btn-dark" style="margin-top: 20px;">Записати прибуток</button>
            </form>
        </div>

        <div id="screen-report" class="screen">
            <span class="back-link" onclick="goToScreen('screen-main')">← Головна</span>
            <h2 class="screen-title">Звітність</h2>
            <div class="date-range-row">
                <div class="form-group"><label>З</label><input type="date" id="repFrom" class="standard-input"></div>
                <div class="form-group"><label>По</label><input type="date" id="repTo" class="standard-input"></div>
            </div>
            <button class="btn-main btn-yellow" onclick="generateReport()">Сформувати</button>
            <div class="report-summary">
                <div class="summary-block"><span class="meta-label">ДОХОДИ</span><span class="summary-num text-income" id="repTotalIncome">0 ₴</span></div>
                <div class="summary-block"><span class="meta-label">ВИТРАТИ</span><span class="summary-num text-expense" id="repTotalExpense">0 ₴</span></div>
                <div class="summary-block full-width"><span class="meta-label">БАЛАНС</span><span class="summary-num" id="repNetBalance">0 ₴</span></div>
            </div>
            <div class="chart-container"><canvas id="expenseChart"></canvas></div>
        </div>

        <div id="screen-settings" class="screen">
            <span class="back-link" onclick="goToScreen('screen-main')">← Головна</span>
            <h2 class="screen-title">Бренди</h2>
            <div class="form-group">
                <label>Створити новий мікробізнес</label>
                <div class="select-combo">
                    <input type="text" id="newBusinessName" class="standard-input" placeholder="Назва бренду">
                    <button class="btn-plus-inline" onclick="handleCreateBusiness()">+</button>
                </div>
            </div>
        </div>

    </div>
</div>

<div id="directoryModal" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-title" id="modalTitle">Додати</div>
        <div class="form-group"><input type="text" id="modalInput" class="standard-input" placeholder="Введіть назву..."></div>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button class="btn-main btn-outline" style="height: 46px; font-size: 15px;" onclick="closeModal()">Скасувати</button>
            <button class="btn-main btn-dark" style="height: 46px; font-size: 15px;" onclick="saveModalItem()">Зберегти</button>
        </div>
    </div>
</div>

<script>
    const SPREADSHEET_ID = '1aIEYM9GitfHJ9Eikw9sBTBarSw97ojSYutqqEznRbIc';
    const CLIENT_ID = '630137342173-710gjc52mpk3khcdosbkvmgla7h8sppi.apps.googleusercontent.com';

    let googleToken = null;
    let currentChartInstance = null;
    let currentModalTarget = '';

    let state = JSON.parse(localStorage.getItem('micro_accounting_v3')) || {
        currentBusiness: "Якзаманеться",
        businesses: ["Якзаманеться"],
        categories: ["Матеріали", "Фурнітура", "Логістика", "Пакування"],
        clients: ["Роздріб", "Instagram", "Власний сайт"]
    };

    let transactionsDatabase = [];

    function saveConfig() { localStorage.setItem('micro_accounting_v3', JSON.stringify(state)); }
    function showToast(text) { const toast = document.getElementById('appToast'); toast.innerText = text; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2000); }

    let tokenClient;
    
    function initGoogleClient() {
        if (typeof google === 'undefined' || !google.accounts || !google.accounts.oauth2) {
            setTimeout(initGoogleClient, 200);
            return;
        }
        
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/spreadsheets',
            callback: (tokenResponse) => {
                if (tokenResponse && tokenResponse.access_token) {
                    googleToken = tokenResponse.access_token;
                    
                    // Зберігаємо токен та час його смерті (+1 година)
                    const expireTime = Date.now() + (tokenResponse.expires_in * 1000);
                    localStorage.setItem('g_token', googleToken);
                    localStorage.setItem('g_token_expires', expireTime);

                    showToast("Авторизація успішна!");
                    initAppAfterLogin();
                }
            },
        });

        // ПЕРЕВІРКА ІСНУЮЧОЇ СЕСІЇ (щоб не вилітало)
        const savedToken = localStorage.getItem('g_token');
        const expireTime = localStorage.getItem('g_token_expires');
        
        if (savedToken && expireTime && Date.now() < parseInt(expireTime)) {
            googleToken = savedToken;
            initAppAfterLogin();
        }
    }

    window.addEventListener('DOMContentLoaded', initGoogleClient);

    function loginWithGoogle() { 
        if (typeof tokenClient === 'undefined' || !tokenClient) {
            alert("Сервіси авторизації ще завантажуються або заблоковані Вашим AdBlock. Вимкніть його або оновіть сторінку.");
            return;
        }
        tokenClient.requestAccessToken({ prompt: 'consent' }); 
    }

    function initAppAfterLogin() {
        // Ховаємо стартовий екран-оверлей, показуємо чистий додаток
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('app-main-layout').style.display = 'flex';
        
        const isDesktop = window.innerWidth >= 800;
        if(isDesktop) {
            document.getElementById('screen-main').style.display = 'flex';
        } else {
            document.getElementById('screen-main').classList.add('active');
        }

        renderBusinessSelector();
        populateDropdowns();
        
        const now = new Date();
        document.getElementById('repFrom').value = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
        document.getElementById('repTo').value = new Date(now.getFullYear(), now.getMonth() + 1, 0).toISOString().split('T')[0];

        syncWithGoogleSheets();
    }

    async function syncWithGoogleSheets() {
        showToast("Синхронізація з Диском...");
        const currentYear = new Date().getFullYear().toString();

        try {
            let metadataResp = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}`, {
                headers: { 'Authorization': `Bearer ${googleToken}` }
            });
            let metadata = await metadataResp.json();
            
            if(metadata.error && metadata.error.status === "UNAUTHENTICATED") {
                // Токен прострочився в процесі
                localStorage.removeItem('g_token');
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('app-main-layout').style.display = 'none';
                return;
            }

            let sheetExists = metadata.sheets.some(s => s.properties.title === currentYear);

            if (!sheetExists) {
                await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}:batchUpdate`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${googleToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ requests: [{ addSheet: { properties: { title: currentYear } } }] })
                });
                await appendRowToSheet(currentYear, ["ID", "Дата", "Бренд", "Тип", "Назва", "Ціна", "Кількість", "Разом", "Категорія/Клієнт"]);
            }

            let dataResp = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${currentYear}!A2:I10000`, {
                headers: { 'Authorization': `Bearer ${googleToken}` }
            });
            let dataRows = await dataResp.json();

            transactionsDatabase = [];
            if (dataRows.values) {
                dataRows.values.forEach(row => {
                    transactionsDatabase.push({
                        date: row[1], business: row[2], type: row[3], name: row[4],
                        price: parseFloat(row[5]) || 0, qty: parseFloat(row[6]) || 1,
                        total: parseFloat(row[7]) || 0, categoryOrClient: row[8]
                    });
                });
            }
            calculateMainBalance();
            showToast("Дані оновлено!");
        } catch (err) {
            console.error(err);
            showToast("Помилка зв'язку.");
        }
    }

    async function appendRowToSheet(sheetName, rowData) {
        await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${sheetName}!A:A:append?valueInputOption=USER_ENTERED`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${googleToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ values: [rowData] })
        });
    }

    function goToScreen(screenId) {
        document.getElementById('btn-nav-expense').classList.remove('selected');
        document.getElementById('btn-nav-income').classList.remove('selected');
        document.getElementById('btn-nav-report').classList.remove('selected');

        if(screenId === 'screen-expense') document.getElementById('btn-nav-expense').classList.add('selected');
        if(screenId === 'screen-income') document.getElementById('btn-nav-income').classList.add('selected');
        if(screenId === 'screen-report') document.getElementById('btn-nav-report').classList.add('selected');

        const isDesktop = window.innerWidth >= 800;
        if (isDesktop) {
            document.getElementById('pc-blank').style.display = 'none';
            document.querySelectorAll('.content-panel .screen').forEach(s => s.classList.remove('active'));
            const target = document.querySelector(`.content-panel #${screenId}`);
            if(target) target.classList.add('active');
        } else {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        if(screenId === 'screen-main') {
            if(isDesktop) document.getElementById('pc-blank').style.display = 'flex';
            calculateMainBalance();
        }
    }

    function calculateMainBalance() {
        let balance = 0;
        transactionsDatabase.forEach(t => {
            if(t.business === state.currentBusiness) {
                if(t.type === 'прибуток') balance += t.total;
                if(t.type === 'витрата') balance -= t.total;
            }
        });
        document.getElementById('mainBalance').innerText = `${balance.toLocaleString('uk-UA')} ₴`;
    }

    async function handleSaveExpense(e) {
        e.preventDefault();
        showToast("Запис...");
        const price = parseFloat(document.getElementById('expPrice').value);
        const qty = parseFloat(document.getElementById('expQty').value);
        const name = document.getElementById('expName').value.trim();
        const cat = document.getElementById('expCategory').value;
        const currentYear = new Date().getFullYear().toString();
        const dateStr = new Date().toISOString().split('T')[0];
        const total = price * qty;

        const row = [Date.now().toString(), dateStr, state.currentBusiness, 'витрата', name, price, qty, total, cat];
        try {
            await appendRowToSheet(currentYear, row);
            document.getElementById('expenseForm').reset();
            document.getElementById('expQty').value = "1";
            await syncWithGoogleSheets();
            goToScreen('screen-main');
        } catch(e) { showToast("Помилка збереження."); }
    }

    async function handleSaveIncome(e) {
        e.preventDefault();
        showToast("Запис...");
        const amount = parseFloat(document.getElementById('incAmount').value);
        const name = document.getElementById('incName').value.trim();
        const client = document.getElementById('incClient').value;
        const currentYear = new Date().getFullYear().toString();
        const dateStr = new Date().toISOString().split('T')[0];

        const row = [Date.now().toString(), dateStr, state.currentBusiness, 'прибуток', name, amount, 1, amount, client];
        try {
            await appendRowToSheet(currentYear, row);
            document.getElementById('incomeForm').reset();
            await syncWithGoogleSheets();
            goToScreen('screen-main');
        } catch(e) { showToast("Помилка збереження."); }
    }

    function openReportScreen() { goToScreen('screen-report'); generateReport(); }

    function generateReport() {
        const fromDate = document.getElementById('repFrom').value;
        const toDate = document.getElementById('repTo').value;
        let totalIncome = 0, totalExpense = 0, categoryData = {};

        transactionsDatabase.forEach(t => {
            if(t.business === state.currentBusiness && t.date >= fromDate && t.date <= toDate) {
                if(t.type === 'прибуток') totalIncome += t.total;
                if(t.type === 'витрата') {
                    totalExpense += t.total;
                    categoryData[t.categoryOrClient] = (categoryData[t.categoryOrClient] || 0) + t.total;
                }
            }
        });

        document.getElementById('repTotalIncome').innerText = `${totalIncome.toLocaleString('uk-UA')} ₴`;
        document.getElementById('repTotalExpense').innerText = `${totalExpense.toLocaleString('uk-UA')} ₴`;
        const net = totalIncome - totalExpense;
        document.getElementById('repNetBalance').innerText = `${net.toLocaleString('uk-UA')} ₴`;
        document.getElementById('repNetBalance').style.color = net >= 0 ? '#248A3D' : '#D9383A';

        renderPieChart(categoryData);
    }

    function renderPieChart(dataObj) {
        const ctx = document.getElementById('expenseChart').getContext('2d');
        if(currentChartInstance) currentChartInstance.destroy();
        const labels = Object.keys(dataObj); const dataValues = Object.values(dataObj);
        if(labels.length === 0) return;

        currentChartInstance = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: labels,
                datasets: [{
                    data: dataValues,
                    backgroundColor: ['#E19E11', '#1C1C1E', '#8E8E93', '#248A3D', '#4478FF', '#FF5252'],
                    borderWidth: 2, borderColor: '#ffffff'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });
    }

    function renderBusinessSelector() {
        const select = document.getElementById('businessSelect'); select.innerHTML = '';
        state.businesses.forEach(b => {
            const opt = document.createElement('option'); opt.value = b; opt.innerText = b;
            if(b === state.currentBusiness) opt.selected = true;
            select.appendChild(opt);
        });
    }

    function populateDropdowns() {
        const expCat = document.getElementById('expCategory'); expCat.innerHTML = '';
        state.categories.forEach(c => expCat.innerHTML += `<option value="${c}">${c}</option>`);
        const incCli = document.getElementById('incClient'); incCli.innerHTML = '';
        state.clients.forEach(c => incCli.innerHTML += `<option value="${c}">${c}</option>`);
    }

    function changeBusiness() {
        state.currentBusiness = document.getElementById('businessSelect').value; saveConfig(); calculateMainBalance();
        if(window.innerWidth >= 800 && document.getElementById('screen-report').classList.contains('active')) generateReport();
    }

    function handleCreateBusiness() {
        const input = document.getElementById('newBusinessName'); const name = input.value.trim();
        if(name && !state.businesses.includes(name)) {
            state.businesses.push(name); state.currentBusiness = name;
            saveConfig(); renderBusinessSelector(); input.value = ''; showToast(`Бренд створено!`); goToScreen('screen-main');
        }
    }

    function openModal(type) {
        currentModalTarget = type;
        document.getElementById('modalTitle').innerText = type === 'category' ? 'Нова категорія' : 'Новий клієнт';
        document.getElementById('modalInput').value = '';
        document.getElementById('directoryModal').classList.add('active');
    }
    function closeModal() { document.getElementById('directoryModal').classList.remove('active'); }

    function saveModalItem() {
        const val = document.getElementById('modalInput').value.trim();
        if(val) {
            if(currentModalTarget === 'category' && !state.categories.includes(val)) state.categories.push(val);
            if(currentModalTarget === 'client' && !state.clients.includes(val)) state.clients.push(val);
            saveConfig(); populateDropdowns(); closeModal(); showToast("Оновлено!");
        }
    }
</script>
</body>
</html>
